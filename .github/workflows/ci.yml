name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Python deps
        run: pip install -e '.[dev]'

      - name: Install Node deps
        run: npm ci

      - name: Verify codegen is up to date
        run: |
          python scripts/sync_modes.py
          python scripts/sync_crc.py
          git diff --exit-code src/lib/modeStore.ts src/lib/mavlink/crc.ts || (echo "ERROR: Run scripts/sync_modes.py and scripts/sync_crc.py to regenerate" && exit 1)

      - name: Ruff lint
        run: ruff check backend/ scripts/ tests/

      - name: Python tests with coverage
        run: python -m pytest tests/test_unit_*.py tests/test_contract_*.py -v --cov=backend --cov-report=term-missing --cov-fail-under=95

      - name: TypeScript check
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Frontend tests with coverage
        run: npx vitest run --coverage --coverage.thresholds.lines=85

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          TOTAL=$(du -sb dist/assets/ | cut -f1)
          echo "Bundle size: $(( TOTAL / 1024 )) KB"
          if [ "$TOTAL" -gt 2621440 ]; then
            echo "ERROR: Bundle exceeds 2.5MB limit ($TOTAL bytes)"
            exit 1
          fi

      - name: Security audit
        run: npm audit --audit-level=critical

  # End-to-end smoke against real ArduPilot firmware: prebuilt Copter-stable
  # SITL from firmware.ardupilot.org drives the same code paths a physical FC
  # would (full flight: connect → params → modes → arm → takeoff → mission →
  # RTL → disarm). Catches protocol regressions unit/contract tests can't.
  sitl-smoke:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: pip install -e '.[dev]'

      - name: Probe current Copter stable version
        id: sitl-ver
        run: echo "ver=$(curl -sf https://firmware.ardupilot.org/Copter/stable/SITL_x86_64_linux_gnu/firmware-version.txt)" >> "$GITHUB_OUTPUT"

      - name: Cache SITL binary
        id: sitl-cache
        uses: actions/cache@v4
        with:
          path: ~/sitl
          key: sitl-copter-${{ steps.sitl-ver.outputs.ver }}

      - name: Download SITL binary + default params
        if: steps.sitl-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/sitl
          curl -sfL -o ~/sitl/arducopter https://firmware.ardupilot.org/Copter/stable/SITL_x86_64_linux_gnu/arducopter
          # ArduCopter-stable ref tracks the same release as the stable binary
          curl -sfL -o ~/sitl/copter.parm https://raw.githubusercontent.com/ArduPilot/ardupilot/ArduCopter-stable/Tools/autotest/default_params/copter.parm

      - name: Probe SITL boot in foreground
        run: |
          # SITL has died silently mid-boot on this runner twice (log stops
          # at "Smoothing reset", no signal message survives a backgrounded
          # shell). Run it foreground under timeout with a held client
          # connection so bash reports the terminating signal: 124 = alive
          # through the window (good), 132 = SIGILL, 139 = SIGSEGV.
          chmod +x ~/sitl/arducopter
          mkdir -p /tmp/sitl-probe && cd /tmp/sitl-probe
          (sleep 3; python3 -c 'import socket,time; s=socket.create_connection(("127.0.0.1",5760),timeout=10); time.sleep(25)') &
          set +e
          timeout 30 ~/sitl/arducopter --model + --speedup 8 -w \
            --defaults ~/sitl/copter.parm \
            --home -35.363261,149.165230,584,353
          code=$?
          set -e
          echo "SITL foreground exit code: $code (124 = survived probe window)"
          if [ "$code" != "124" ]; then exit 1; fi

      - name: Start ArduCopter SITL
        run: |
          chmod +x ~/sitl/arducopter
          mkdir -p /tmp/sitl-run && cd /tmp/sitl-run
          # CMAC home — matches the waypoint/fence coords in sitl_verify.py
          # setsid + nohup + </dev/null: a plain '&' child dies with its
          # step's process group here (foreground probe survives its full
          # window; the identical backgrounded launch died mid-boot twice).
          # stdbuf line-buffers the log so a kill can't eat the tail.
          setsid nohup stdbuf -oL -eL ~/sitl/arducopter --model + --speedup 8 -w \
            --defaults ~/sitl/copter.parm \
            --home -35.363261,149.165230,584,353 > sitl.log 2>&1 < /dev/null &
          # Passive listen check only. SITL's SERIAL0 boot-gates on its
          # first TCP client; a probe that connects and drops left the
          # backend unable to connect afterwards (observed in CI: sitl.log
          # shows exactly one consumed connection, verify aborts).
          for i in $(seq 1 30); do
            ss -tln | grep -q ':5760 ' && exit 0
            sleep 1
          done
          echo "SITL never opened TCP 5760" && exit 1

      - name: Start backend
        run: |
          ARGUS_LOG_LEVEL=DEBUG python -m uvicorn backend.app:app --host 127.0.0.1 --port 8100 \
            --log-level info > /tmp/sitl-run/backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8100/health > /dev/null && exit 0
            sleep 1
          done
          echo "backend never became healthy" && exit 1

      - name: Run SITL verification
        run: python tests/sitl_verify.py

      - name: Diagnostics
        if: failure()
        run: |
          echo "── arducopter process ──"; ps -o pid,pcpu,pmem,etime,args -C arducopter || true
          echo "── TCP 5760 ──"; ss -tn | grep 5760 || true
          echo "── sitl.log tail ──"; tail -40 /tmp/sitl-run/sitl.log || true
          echo "── backend.log tail ──"; tail -40 /tmp/sitl-run/backend.log || true
          echo "── session ──"; curl -s http://127.0.0.1:8100/session || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sitl-smoke-logs
          path: /tmp/sitl-run/*.log
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Python deps
        run: pip install -e '.[dev]'

      - name: Install Node deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (no-backend specs)
        run: >-
          npx playwright test --config=tests/playwright.config.ts --project=chromium
          tests/e2e/smoke.spec.ts
          tests/e2e/navigation.spec.ts
          tests/e2e/accessibility.spec.ts
          tests/e2e/command-palette.spec.ts
          tests/e2e/error-boundary.spec.ts
          tests/e2e/keyboard.spec.ts
          tests/e2e/map.spec.ts
          tests/e2e/mission.spec.ts
          tests/e2e/mobile.spec.ts
          tests/e2e/pwa.spec.ts
          tests/e2e/settings.spec.ts
          tests/e2e/resilience.spec.ts
        env:
          ARGUS_NO_BROWSER: '1'

      - name: Start backend (simulator)
        run: python run.py --sim &
        env:
          ARGUS_NO_BROWSER: '1'

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8100/health && break
            sleep 1
          done

      - name: Run E2E tests (backend-required specs)
        run: >-
          npx playwright test --config=tests/playwright.config.ts --project=chromium
          tests/e2e/connected-flow.spec.ts
          tests/e2e/connection.spec.ts
          tests/e2e/drone-control.spec.ts
          tests/e2e/event-log.spec.ts
          tests/e2e/params.spec.ts
          tests/e2e/websocket.spec.ts
          tests/e2e/memory.spec.ts
        env:
          ARGUS_NO_BROWSER: '1'

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7
