name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Python deps
        run: pip install -e '.[dev]'

      - name: Install Node deps
        run: npm ci

      - name: Ruff lint
        run: ruff check backend/ scripts/ tests/

      - name: Python tests with coverage
        run: python -m pytest tests/test_unit_*.py -v --cov=backend --cov-report=term-missing

      - name: TypeScript check
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Frontend tests with coverage
        run: npx vitest run --coverage

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=critical

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Python deps
        run: pip install -e '.[dev]'

      - name: Install Node deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npx playwright test --project=chromium tests/e2e/smoke.spec.ts tests/e2e/navigation.spec.ts
        env:
          ARGUS_NO_BROWSER: '1'

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
          retention-days: 7
