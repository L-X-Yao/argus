name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Python deps
        run: pip install -e '.[dev]'

      - name: Install Node deps
        run: npm ci

      - name: Ruff lint
        run: ruff check backend/ scripts/ tests/

      - name: Python tests
        run: python -m pytest tests/test_unit_*.py tests/test_contract_*.py -v --cov=backend --cov-fail-under=95

      - name: TypeScript check
        run: npx svelte-check --tsconfig ./tsconfig.json

      - name: Frontend tests
        run: npx vitest run --coverage --coverage.thresholds.lines=85

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: |
          pip install -e '.[dev]'
          npm ci

      - name: Build Windows package (amd64)
        run: python scripts/build_package.py --arch amd64

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            bash scripts/changelog.sh "$PREV_TAG" > RELEASE_NOTES.md
          else
            bash scripts/changelog.sh > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release/*.zip
